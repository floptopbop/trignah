<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOBLIN_OS // OMNI_DIAL_V8_TEMPORAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        
        :root { --neon: #F8EBD1; --void: #656E5E; }
        * { box-sizing: border-box; }
        body { background: var(--void); color: var(--neon); font-family: 'Space Mono', monospace; margin: 0; padding: 0; overflow: hidden; touch-action: none; }
        
        #header {
            position: fixed; top: 0; left: 0; right: 0; background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--neon); padding: 6px 8px; font-size: 10px;
            text-transform: uppercase; letter-spacing: 1px; z-index: 100; line-height: 1.3;
        }
        
        #header span { display: block; word-break: break-all; }
        
        #f-stat { position: fixed; top: 48px; left: 5px; font-size: 10px; font-weight: bold; letter-spacing: 0.5px; z-index: 99; }
        
        #canvas-wrap { 
            position: fixed; top: 48px; left: 0; right: 0; bottom: 140px;
            display: flex; align-items: center; justify-content: center; 
            background: #050505; padding: 8px; overflow: hidden;
        }
        
        canvas { border: 2px solid var(--neon); image-rendering: pixelated; max-width: 100%; max-height: 100%; display: block; }
        
        #dash { 
            position: fixed; bottom: 0; left: 0; right: 0; width: 100%; height: 140px;
            background: rgba(0,0,0,0.98); border-top: 2px solid var(--neon); padding: 6px 4px; 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; z-index: 1000; overflow-y: auto;
        }
        
        .ctrl { display: flex; flex-direction: column; font-size: 9px; text-transform: uppercase; border: 1px solid #222; padding: 3px; gap: 1px; }
        .ctrl label { font-size: 8px; font-weight: bold; letter-spacing: 0.5px; }
        
        input[type=range] { appearance: none; background: #222; height: 2px; border: none; margin: 1px 0; padding: 0; width: 100%; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 6px; height: 10px; background: var(--neon); border-radius: 0; cursor: pointer; }
        input[type=range]::-moz-range-thumb { width: 8px; height: 8px; background: var(--neon); border: none; border-radius: 0; cursor: pointer; }
        
        .btn { 
            background: #000; color: var(--neon); border: 1px solid var(--neon); 
            padding: 4px 2px; font-weight: bold; font-size: 8px; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 0.5px; font-family: 'Space Mono', monospace;
        }
        .btn:active { background: var(--neon); color: #000; }
        #loader { display: none; }
    </style>
</head>
<body>

<div id="header">
    <span>ENGINE: ROTATERATORTEDRERR🐒 // TIME_DILATION_ACTIVE</span>
    <span>STATUS: READY_FOR_TRAUMA</span>
</div>

<div id="f-stat">FRAGMENTS: <span id="fc">0</span></div>
<div id="canvas-wrap"><canvas id="vort"></canvas></div>

<div id="dash">
    <div class="ctrl"><label>SHRED</label><input type="range" id="s-shred" min="2" max="100" value="32"></div>
    <div class="ctrl"><label>GYRO</label><input type="range" id="s-gyro" min="0" max="100" value="40"></div>
    <div class="ctrl"><label>CHAOS</label><input type="range" id="s-chaos" min="0" max="20" step="0.5" value="5"></div>
    <button id="boot" class="btn">SENSORS</button>
    
    <div class="ctrl"><label>GRAVITY</label><input type="range" id="s-grav" min="0" max="2.0" step="0.05" value="0"></div>
    <div class="ctrl"><label>FRICTION</label><input type="range" id="s-fric" min="0.80" max="1.0" step="0.005" value="0.98"></div>
    <div class="ctrl"><label>MASS</label><input type="range" id="s-mass" min="0" max="5.0" step="0.1" value="0.6"></div>
    <button id="stir" class="btn">STIR</button>
    
    <div class="ctrl"><label>BOUNCE</label><input type="range" id="s-bnc" min="0.1" max="2.0" step="0.1" value="0.2"></div>
    <div class="ctrl"><label>SMEAR</label><input type="range" id="s-smear" min="0.01" max="0.5" step="0.01" value="0.1"></div>
    <div class="ctrl"><label>TIME</label><input type="range" id="s-time" min="0" max="2.0" step="0.05" value="1.0"></div>
    <label for="loader" class="btn" style="text-align:center; cursor:pointer;">INJECT</label>
    
    <input type="file" id="loader" accept="image/*">
</div>

<script>
    const canvas = document.getElementById('vort');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    let state = {
        img: null, blocks: [], shred: 24, gyroG: 20, chaos: 2, 
        bnc: 0.5, grav: 0, fric: .9, massS: 0.6, smear: 0.8, 
        timeScale: 0.5, // <-- Temporal control state
        g: { x: 0, y: 0 }, active: false
    };

    const bindDial = (id, key) => {
        const el = document.getElementById(id);
        if (el) {
            el.oninput = (e) => {
                state[key] = parseFloat(e.target.value);
                if(key === 'shred' && state.img) process();
            };
        }
    };
    
    bindDial('s-shred', 'shred');
    bindDial('s-gyro', 'gyroG');
    bindDial('s-chaos', 'chaos');
    bindDial('s-bnc', 'bnc');
    bindDial('s-grav', 'grav');
    bindDial('s-fric', 'fric');
    bindDial('s-mass', 'massS');
    bindDial('s-smear', 'smear');
    bindDial('s-time', 'timeScale'); // Bind new dial

    document.getElementById('boot').onclick = async () => {
        if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
            try { await DeviceOrientationEvent.requestPermission(); } catch(e) {}
        }
        window.addEventListener('deviceorientation', e => {
            state.g.x = (e.gamma || 0) * 0.1;
            state.g.y = (e.beta || 0) * 0.1;
        });
        document.getElementById('boot').innerText = "VORTEX_LIVE";
    };

    document.getElementById('stir').onclick = () => {
        state.blocks.forEach(bl => {
            bl.vx += (Math.random()-0.5)*20;
            bl.vy -= Math.random()*20;
        });
    };

    document.getElementById('loader').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            state.img = new Image();
            state.img.onload = process;
            state.img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function process() {
        const wrap = document.getElementById('canvas-wrap');
        const maxW = wrap.clientWidth - 16;
        const maxH = wrap.clientHeight - 16;
        const imgRatio = state.img.width / state.img.height;
        const wrapRatio = maxW / maxH;
        
        let canvasW, canvasH;
        if (imgRatio > wrapRatio) { canvasW = maxW; canvasH = maxW / imgRatio; } 
        else { canvasH = maxH; canvasW = maxH * imgRatio; }
        
        canvas.width = canvasW; canvas.height = canvasH;
        ctx.drawImage(state.img, 0, 0, canvas.width, canvas.height);
        const d = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        state.blocks = [];
        
        function split(x, y, w, h, depth) {
            let i = (Math.floor(y + h/2)*canvas.width + Math.floor(x + w/2)) * 4;
            if (depth >= 9 || w <= 4 || (depth > 1 && Math.random()*100 > (100 - state.shred))) {
                state.blocks.push({
                    x, y, w, h, 
                    vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20,
                    m: (w * h) / 100 * state.massS, 
                    c: `rgb(${d[i]},${d[i+1]},${d[i+2]})`
                }); 
                return;
            }
            let hw=w/2, hh=h/2;
            split(x,y,hw,hh,depth+1); split(x+hw,y,hw,hh,depth+1);
            split(x,y+hh,hw,hh,depth+1); split(x+hw,y+hh,hw,hh,depth+1);
        }
        split(0, 0, canvas.width, canvas.height, 0);
        document.getElementById('fc').innerText = state.blocks.length;
        state.active = true;
    }

    function draw() {
        ctx.fillStyle = `rgba(0,0,0,${state.smear})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (state.active && state.blocks) {
            let dt = state.timeScale; // Time distortion multiplier

            state.blocks.forEach(bl => {
                if (dt > 0) {
                    // Scale all force applications by time
                    bl.vx += (state.g.x * state.gyroG * 0.05) * dt;
                    bl.vy += (state.g.y * state.gyroG * 0.05 + (state.grav * bl.m)) * dt;
                    
                    bl.vx += ((Math.random()-0.5) * state.chaos) * dt;
                    bl.vy += ((Math.random()-0.5) * state.chaos) * dt;

                    // Clever hack: pow() friction so it dampens correctly at low speeds and stops when paused
                    bl.vx *= Math.pow(state.fric, dt); 
                    bl.vy *= Math.pow(state.fric, dt);
                    
                    // Scale movement
                    bl.x += bl.vx * dt; 
                    bl.y += bl.vy * dt;
                }

                if(bl.x < 0) { bl.x = 0; bl.vx *= -state.bnc; }
                if(bl.x + bl.w > canvas.width) { bl.x = canvas.width - bl.w; bl.vx *= -state.bnc; }
                if(bl.y < 0) { bl.y = 0; bl.vy *= -state.bnc; }
                if(bl.y + bl.h > canvas.height) { 
                    bl.y = canvas.height - bl.h; 
                    bl.vy *= -(state.bnc * 0.5); 
                }

                ctx.fillStyle = bl.c;
                ctx.fillRect(bl.x, bl.y, bl.w - 0.5, bl.h - 0.5);
            });
        }
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
