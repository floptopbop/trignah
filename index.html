
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HPTT // HARMONIC_WEAVER_V12</title>
    <style>
        :root {
            --bg-base: #05070A;
            --panel-bg: rgba(10, 15, 25, 0.9);
            --accent-blue: #38BDF8;
            --accent-green: #4ADE80;
            --text-primary: #E2E8F0;
            --border-color: #1E293B;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-base); color: var(--text-primary);
            font-family: ui-monospace, monospace;
            overflow: hidden; touch-action: none;
        }

        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* HUD */
        #hud {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: var(--panel-bg); border: 1px solid var(--border-color);
            padding: 10px; border-radius: 4px; width: 150px; pointer-events: auto;
        }
        .stat { font-size: 9px; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .label { color: #64748B; }
        .val { color: var(--accent-blue); }

        /* MANIFEST PANEL */
        #manifest {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 45%;
            background: #0F172A; border-top: 1px solid var(--accent-blue);
            z-index: 200; transform: translateY(calc(100% - 40px));
            transition: transform 0.3s ease; display: flex; flex-direction: column;
        }
        #manifest.open { transform: translateY(0); }
        #handle {
            height: 40px; background: #05070A; display: flex; align-items: center;
            justify-content: space-between; padding: 0 20px; cursor: pointer;
            font-weight: bold; font-size: 10px; color: var(--accent-blue);
        }
        #controls { flex: 1; overflow-y: auto; padding: 15px; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 6px 0; border-bottom: 1px solid #1E293B; font-size: 11px; }
        input {
            background: #05070A; border: 1px solid #334155; color: var(--accent-green);
            padding: 4px; border-radius: 3px; width: 70px; text-align: right; font-family: inherit;
        }
        
        .btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
        button {
            flex: 1; background: #1E293B; border: 1px solid #334155; color: white;
            padding: 8px; font-size: 10px; cursor: pointer; border-radius: 3px;
        }
        button:active { background: var(--accent-blue); }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="hud">
        <div class="stat"><span class="label">PHASE</span> <span id="ui-t" class="val">0.00</span></div>
        <div class="stat"><span class="label">WEAVE</span> <span id="ui-w" class="val">ACTIVE</span></div>
        <div style="font-size: 8px; color: #475569; margin-top: 5px;">LONG PRESS TO CLEAR</div>
    </div>

    <div id="manifest">
        <div id="handle" onclick="document.getElementById('manifest').classList.toggle('open')">
            <span>GEOMETRY_ENGINE_V12</span>
            <span>⎐</span>
        </div>
        <div id="controls">
            <div class="btn-row">
                <button onclick="clearCanvas()">CLEAR_LATTICE</button>
                <button onclick="preset('Spirograph')">SPIRO_PRESET</button>
                <button onclick="preset('GraphPaper')">GRID_PRESET</button>
            </div>
            <table id="param-table"></table>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let state = {
            t: 0,
            touch: { x: window.innerWidth/2, y: window.innerHeight/2, active: false },
            params: {
                "ENTITIES": 4.0,
                "STEP": 0.02,
                "LATTICE_DECAY": 0.0, // 0 = Infinite trails
                "FREQ_X": 2.5,
                "FREQ_Y": 3.1,
                "AMPLITUDE": 150.0,
                "PHASE_SHIFT": 0.05, // Slight diff between entities
                "LINE_WIDTH": 0.5,
                "COLOR_OPACITY": 0.4
            }
        };

        function preset(type) {
            if(type === 'Spirograph') {
                state.params.FREQ_X = 5.0;
                state.params.FREQ_Y = 2.0;
                state.params.PHASE_SHIFT = 0.02;
                state.params.AMPLITUDE = 180;
                state.params.LATTICE_DECAY = 0.001;
            } else {
                state.params.FREQ_X = 1.0;
                state.params.FREQ_Y = 1.0;
                state.params.PHASE_SHIFT = 0.5;
                state.params.AMPLITUDE = 120;
                state.params.LATTICE_DECAY = 0.0;
            }
            clearCanvas();
            renderParams();
        }

        function renderParams() {
            const table = document.getElementById('param-table');
            table.innerHTML = '';
            Object.keys(state.params).forEach(key => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${key}</td><td style="text-align:right"><input type="text" value="${state.params[key]}" onchange="state.params['${key}']=parseFloat(this.value)"></td>`;
                table.appendChild(tr);
            });
        }

        function clearCanvas() {
            ctx.fillStyle = '#05070A';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            clearCanvas();
        }

        // Touch logic
        window.addEventListener('touchstart', (e) => { 
            if(e.target.closest('#manifest') || e.target.closest('#hud')) return;
            state.touch.active = true; 
            state.touch.x = e.touches[0].clientX;
            state.touch.y = e.touches[0].clientY;
        });
        window.addEventListener('touchmove', (e) => {
            if(state.touch.active) {
                state.touch.x = e.touches[0].clientX;
                state.touch.y = e.touches[0].clientY;
            }
        });
        window.addEventListener('touchend', () => state.touch.active = false);
        window.addEventListener('mousedown', (e) => {
            if(e.target.closest('#manifest') || e.target.closest('#hud')) return;
            state.touch.active = true;
            state.touch.x = e.clientX;
            state.touch.y = e.clientY;
        });
        window.addEventListener('mousemove', (e) => {
            if(state.touch.active) {
                state.touch.x = e.clientX;
                state.touch.y = e.clientY;
            }
        });
        window.addEventListener('mouseup', () => state.touch.active = false);

        function loop() {
            state.t += state.params.STEP;
            
            // Faint decay for "nearly infinite" look or 0 for total persistence
            if(state.params.LATTICE_DECAY > 0) {
                ctx.fillStyle = `rgba(5, 7, 10, ${state.params.LATTICE_DECAY})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            for(let i=0; i < state.params.ENTITIES; i++) {
                const shift = i * state.params.PHASE_SHIFT;
                
                // PURE MATHEMATICAL POSITIONING
                // x = sin(t * freq) * amp
                // y = cos(t * freq) * amp
                const x = state.touch.x + Math.sin(state.t + shift * state.params.FREQ_X) * state.params.AMPLITUDE;
                const y = state.touch.y + Math.cos(state.t * state.params.FREQ_Y + shift) * state.params.AMPLITUDE;

                // We draw small segments every frame to build the "paper"
                ctx.beginPath();
                ctx.strokeStyle = `rgba(56, 189, 248, ${state.params.COLOR_OPACITY})`;
                ctx.lineWidth = state.params.LINE_WIDTH;
                
                // Store last pos to draw line
                if(!pLast[i]) pLast[i] = {x, y};
                ctx.moveTo(pLast[i].x, pLast[i].y);
                ctx.lineTo(x, y);
                ctx.stroke();
                
                pLast[i] = {x, y};
            }

            document.getElementById('ui-t').innerText = state.t.toFixed(2);
            requestAnimationFrame(loop);
        }

        let pLast = [];
        window.addEventListener('resize', resize);
        renderParams();
        resize();
        loop();
    </script>
</body>
</html>
